name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit tests (protocol + core)
        run: npm test

      - name: Build
        run: npm run build

      # VS Code integration tests need a display server on Linux.
      - name: Integration tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:integration

      - name: Integration tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: npm run test:integration

      - name: Package VSIX
        run: npm run package

      - name: Upload VSIX
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: semanticmatter-autonomous-development-vsix
          path: packages/vscode-extension/*.vsix
          if-no-files-found: error
